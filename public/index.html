<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭任務管理</title>
  <style>
    :root {
      --bg: #f6f7f3;
      --panel: #ffffff;
      --ink: #27302c;
      --muted: #66716b;
      --line: #dfe5dc;
      --primary: #246a73;
      --primary-dark: #174f56;
      --accent: #f2b84b;
      --danger: #b94e48;
      --success: #3b8f62;
      --shadow: 0 12px 34px rgba(34, 48, 42, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
    }

    header {
      background: #173f45;
      color: white;
      padding: 22px 5vw;
    }

    .header-inner {
      width: min(1160px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      margin-bottom: 4px;
      font-size: 28px;
      letter-spacing: 0;
    }

    header p {
      margin-bottom: 0;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.6;
    }

    .shell {
      width: min(1160px, 92vw);
      margin: 20px auto 40px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      padding: 4px;
      border: 1px solid var(--line);
      background: #eef2ec;
      border-radius: 8px;
      gap: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h2 {
      margin-bottom: 14px;
      font-size: 21px;
    }

    h3 {
      margin-bottom: 10px;
      font-size: 17px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: var(--ink);
      font-weight: 700;
      font-size: 14px;
    }

    input, textarea, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid #cbd5cf;
      border-radius: 8px;
      padding: 10px 11px;
      color: var(--ink);
      background: white;
      font: inherit;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      padding: 9px 14px;
      background: var(--primary);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--primary-dark); }
    button:disabled { cursor: not-allowed; opacity: 0.55; }

    .btn-light {
      border: 1px solid var(--line);
      background: white;
      color: var(--primary);
    }

    .btn-light:hover { background: #eef5f2; }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: #943c37; }
    .btn-success { background: var(--success); }
    .btn-success:hover { background: #2f744f; }
    .active-btn { background: var(--primary); color: white; }

    .stack { display: grid; gap: 12px; }
    .hidden { display: none !important; }

    .muted {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      margin: 18px 0;
      background: var(--line);
    }

    .child-item, .task {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfa;
    }

    .child-item {
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .child-item:hover, .child-item.active {
      border-color: var(--primary);
      background: #edf7f4;
    }

    .child-name, .task-title {
      font-weight: 800;
      font-size: 17px;
      overflow-wrap: anywhere;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #f7faf4;
      color: var(--muted);
      text-align: center;
    }

    .summary-box b {
      display: block;
      color: var(--primary);
      font-size: 28px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 3px 10px;
      background: #fff2cf;
      color: #77540d;
      font-size: 13px;
      font-weight: 800;
    }

    .status.done {
      background: #dff2e5;
      color: #23613e;
    }

    .task {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .task.done {
      border-color: #b9dbc4;
      background: #f1fbf4;
    }

    .task p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .photo {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .empty, .notice {
      border: 1px dashed #c9d3cb;
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfa;
      color: var(--muted);
      line-height: 1.65;
    }

    .notice {
      border-style: solid;
      background: #fff8e8;
      color: #6e5519;
    }

    .reward {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(23, 34, 31, 0.36);
      z-index: 20;
    }

    .reward-card {
      width: min(340px, 100%);
      border-radius: 8px;
      padding: 24px;
      background: white;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    .reward-mark {
      display: grid;
      place-items: center;
      width: 56px;
      height: 56px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: var(--accent);
      color: #503500;
      font-size: 30px;
      font-weight: 900;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(360px, calc(100vw - 36px));
      border-radius: 8px;
      padding: 12px 14px;
      background: #173f45;
      color: white;
      box-shadow: var(--shadow);
      display: none;
      z-index: 30;
      line-height: 1.5;
    }

    @media (max-width: 880px) {
      .header-inner, .toolbar { align-items: stretch; flex-direction: column; }
      .grid, .summary { grid-template-columns: 1fr; }
      .segmented { width: 100%; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>家庭任務管理</h1>
        <p>家長派任務，孩子完成並回傳照片，所有資料都存在本機。</p>
      </div>
      <button id="refreshBtn" class="btn-light" type="button">重新整理</button>
    </div>
  </header>

  <main class="shell">
    <div class="toolbar">
      <div class="segmented" aria-label="切換模式">
        <button id="managerModeBtn" class="active-btn" type="button">家長模式</button>
        <button id="childModeBtn" class="btn-light" type="button">孩子模式</button>
      </div>
      <p id="lastUpdatedText" class="muted">尚未同步</p>
    </div>

    <section id="managerPage">
      <div class="grid">
        <aside class="panel">
          <h2>家長設定</h2>
          <label for="managerNameInput">家長名稱</label>
          <input id="managerNameInput" type="text" maxlength="120" placeholder="例如：媽媽、爸爸、阿姨">
          <div class="row" style="margin-top: 10px;">
            <button id="saveManagerNameBtn" type="button">儲存名稱</button>
          </div>
          <p id="managerNameText" class="muted" style="margin-top: 10px;">尚未設定家長名稱</p>

          <div class="divider"></div>

          <h2>孩子名單</h2>
          <label for="childNameInput">新增孩子</label>
          <input id="childNameInput" type="text" maxlength="120" placeholder="輸入孩子名稱">
          <div class="row" style="margin-top: 10px;">
            <button id="addChildBtn" type="button">新增孩子</button>
          </div>

          <div class="divider"></div>
          <div id="childListForManager" class="stack"></div>
        </aside>

        <section class="panel">
          <div class="section-title">
            <h2 id="selectedChildTitle">選擇一位孩子</h2>
            <button id="deleteChildBtn" class="btn-danger hidden" type="button">刪除孩子</button>
          </div>

          <div id="managerWorkArea" class="hidden">
            <div class="summary">
              <div class="summary-box"><b id="totalCount">0</b>全部任務</div>
              <div class="summary-box"><b id="doneCount">0</b>已完成</div>
              <div class="summary-box"><b id="notDoneCount">0</b>待完成</div>
            </div>

            <h3>派新任務</h3>
            <label for="taskNameInput">任務名稱</label>
            <input id="taskNameInput" type="text" maxlength="120" placeholder="例如：整理書桌">

            <label for="taskNoteInput">任務說明</label>
            <textarea id="taskNoteInput" maxlength="500" placeholder="補充完成標準或注意事項"></textarea>

            <label for="needPhotoSelect">是否需要照片</label>
            <select id="needPhotoSelect">
              <option value="no">不需要照片</option>
              <option value="yes">需要上傳照片</option>
            </select>

            <div class="row" style="margin-top: 12px;">
              <button id="sendTaskBtn" type="button">送出任務</button>
            </div>

            <div class="divider"></div>
            <h3>任務紀錄</h3>
            <div id="managerTaskList"></div>
          </div>
        </section>
      </div>
    </section>

    <section id="childPage" class="hidden">
      <div class="grid">
        <aside class="panel">
          <h2>孩子登入</h2>
          <div class="notice">手機與電腦連到同一個 Wi-Fi 後，用電腦的本機 IP 加上連接埠 3000 開啟即可。</div>
          <label for="childLoginSelect">選擇孩子</label>
          <select id="childLoginSelect"></select>
          <div class="row" style="margin-top: 10px;">
            <button id="childLoginBtn" type="button">進入任務</button>
          </div>
          <p id="childLoginText" class="muted" style="margin-top: 10px;">尚未登入孩子</p>
        </aside>

        <section class="panel">
          <h2 id="childTitle">孩子任務</h2>
          <div id="childTaskList" class="empty">請先選擇孩子登入</div>
        </section>
      </div>
    </section>
  </main>

  <div id="rewardBox" class="reward" role="dialog" aria-modal="true" aria-labelledby="rewardTitle">
    <div class="reward-card">
      <div class="reward-mark">✓</div>
      <h3 id="rewardTitle">任務完成</h3>
      <p id="rewardText" class="muted">做得很好，繼續保持。</p>
      <button id="closeRewardBtn" type="button">知道了</button>
    </div>
  </div>

  <div id="toast" class="toast" role="status"></div>

  <script>
    let appData = { managerName: "", children: [] };
    let selectedChildId = "";
    let currentChildId = "";
    let toastTimer = null;

    const $ = id => document.getElementById(id);

    const managerModeBtn = $("managerModeBtn");
    const childModeBtn = $("childModeBtn");
    const managerPage = $("managerPage");
    const childPage = $("childPage");
    const refreshBtn = $("refreshBtn");
    const lastUpdatedText = $("lastUpdatedText");

    const managerNameInput = $("managerNameInput");
    const saveManagerNameBtn = $("saveManagerNameBtn");
    const managerNameText = $("managerNameText");

    const childNameInput = $("childNameInput");
    const addChildBtn = $("addChildBtn");
    const childListForManager = $("childListForManager");
    const deleteChildBtn = $("deleteChildBtn");

    const selectedChildTitle = $("selectedChildTitle");
    const managerWorkArea = $("managerWorkArea");
    const totalCount = $("totalCount");
    const doneCount = $("doneCount");
    const notDoneCount = $("notDoneCount");
    const taskNameInput = $("taskNameInput");
    const taskNoteInput = $("taskNoteInput");
    const needPhotoSelect = $("needPhotoSelect");
    const sendTaskBtn = $("sendTaskBtn");
    const managerTaskList = $("managerTaskList");

    const childLoginSelect = $("childLoginSelect");
    const childLoginBtn = $("childLoginBtn");
    const childLoginText = $("childLoginText");
    const childTitle = $("childTitle");
    const childTaskList = $("childTaskList");

    const rewardBox = $("rewardBox");
    const rewardText = $("rewardText");
    const closeRewardBtn = $("closeRewardBtn");
    const toast = $("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.style.display = "block";
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.style.display = "none";
      }, 2600);
    }

    async function api(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.message || "操作失敗，請稍後再試");
      }

      return data;
    }

    async function loadData({ quiet = false } = {}) {
      try {
        appData = await api("/api/data");

        if (selectedChildId && !appData.children.some(child => child.id === selectedChildId)) {
          selectedChildId = "";
        }

        if (currentChildId && !appData.children.some(child => child.id === currentChildId)) {
          currentChildId = "";
        }

        renderAll();
        lastUpdatedText.textContent = `已同步 ${new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" })}`;
      } catch (error) {
        if (!quiet) showToast(error.message);
      }
    }

    function getSelectedChild() {
      return appData.children.find(child => child.id === selectedChildId);
    }

    function getCurrentChild() {
      return appData.children.find(child => child.id === currentChildId);
    }

    function setModeButtons(mode) {
      const managerActive = mode === "manager";
      managerModeBtn.classList.toggle("active-btn", managerActive);
      managerModeBtn.classList.toggle("btn-light", !managerActive);
      childModeBtn.classList.toggle("active-btn", !managerActive);
      childModeBtn.classList.toggle("btn-light", managerActive);
    }

    function switchMode(mode) {
      managerPage.classList.toggle("hidden", mode !== "manager");
      childPage.classList.toggle("hidden", mode !== "child");
      setModeButtons(mode);
      renderAll();
    }

    function emptyNode(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function createText(tag, className, text) {
      const element = document.createElement(tag);
      if (className) element.className = className;
      element.textContent = text;
      return element;
    }

    function renderAll() {
      renderManagerName();
      renderChildListForManager();
      renderManagerWorkArea();
      renderChildLoginOptions();
      renderChildTaskList();
    }

    function renderManagerName() {
      managerNameText.textContent = appData.managerName
        ? `目前家長：${appData.managerName}`
        : "尚未設定家長名稱";
      managerNameInput.value = appData.managerName || "";
    }

    function renderChildListForManager() {
      emptyNode(childListForManager);

      if (appData.children.length === 0) {
        childListForManager.appendChild(createText("div", "empty", "尚未新增孩子"));
        return;
      }

      appData.children.forEach(child => {
        const done = child.tasks.filter(task => task.done).length;
        const item = document.createElement("button");
        item.type = "button";
        item.className = child.id === selectedChildId ? "child-item active" : "child-item";
        item.style.textAlign = "left";

        item.appendChild(createText("div", "child-name", child.name));
        item.appendChild(createText("div", "muted", `任務 ${child.tasks.length} 件，完成 ${done} 件`));

        item.addEventListener("click", () => {
          selectedChildId = child.id;
          renderAll();
        });

        childListForManager.appendChild(item);
      });
    }

    function renderManagerWorkArea() {
      const child = getSelectedChild();

      if (!child) {
        selectedChildTitle.textContent = "選擇一位孩子";
        managerWorkArea.classList.add("hidden");
        deleteChildBtn.classList.add("hidden");
        return;
      }

      selectedChildTitle.textContent = `正在管理：${child.name}`;
      managerWorkArea.classList.remove("hidden");
      deleteChildBtn.classList.remove("hidden");

      const doneTasks = child.tasks.filter(task => task.done);
      totalCount.textContent = child.tasks.length;
      doneCount.textContent = doneTasks.length;
      notDoneCount.textContent = child.tasks.length - doneTasks.length;

      emptyNode(managerTaskList);

      if (child.tasks.length === 0) {
        managerTaskList.appendChild(createText("div", "empty", "這位孩子目前沒有任務"));
        return;
      }

      child.tasks.forEach(task => {
        managerTaskList.appendChild(createTaskCard({
          child,
          task,
          mode: "manager"
        }));
      });
    }

    function renderChildLoginOptions() {
      emptyNode(childLoginSelect);

      if (appData.children.length === 0) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "尚未建立孩子";
        childLoginSelect.appendChild(option);
        return;
      }

      appData.children.forEach(child => {
        const option = document.createElement("option");
        option.value = child.id;
        option.textContent = child.name;
        childLoginSelect.appendChild(option);
      });

      if (currentChildId) childLoginSelect.value = currentChildId;
    }

    function renderChildTaskList() {
      const child = getCurrentChild();

      if (!child) {
        childTitle.textContent = "孩子任務";
        childLoginText.textContent = "尚未登入孩子";
        childTaskList.className = "empty";
        childTaskList.textContent = "請先選擇孩子登入";
        return;
      }

      childTitle.textContent = `${child.name} 的任務`;
      childLoginText.textContent = `目前登入：${child.name}`;
      childTaskList.className = "";
      emptyNode(childTaskList);

      if (child.tasks.length === 0) {
        childTaskList.className = "empty";
        childTaskList.textContent = "目前沒有任務";
        return;
      }

      child.tasks.forEach(task => {
        childTaskList.appendChild(createTaskCard({
          child,
          task,
          mode: "child"
        }));
      });
    }

    function createTaskCard({ child, task, mode }) {
      const taskDiv = document.createElement("article");
      taskDiv.className = task.done ? "task done" : "task";

      taskDiv.appendChild(createText("div", "task-title", task.name));
      taskDiv.appendChild(createText("p", "", task.note));
      taskDiv.appendChild(createText("p", "", `照片：${task.needPhoto === "yes" ? "需要" : "不需要"}`));
      taskDiv.appendChild(createText("p", "", `建立時間：${task.createdAt || "未記錄"}`));

      if (task.completedAt) {
        taskDiv.appendChild(createText("p", "", `完成時間：${task.completedAt}`));
      }

      const status = createText("span", task.done ? "status done" : "status", task.done ? "已完成" : "待完成");
      taskDiv.appendChild(status);

      if (task.photo) {
        const image = document.createElement("img");
        image.className = "photo";
        image.src = task.photo;
        image.alt = `${task.name} 的完成照片`;
        taskDiv.appendChild(image);
      }

      if (mode === "manager") {
        const row = document.createElement("div");
        row.className = "row";

        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.className = "btn-danger";
        deleteBtn.textContent = "刪除任務";
        deleteBtn.addEventListener("click", async () => {
          if (!confirm("確定要刪除這個任務？")) return;
          await runAction(() => api(`/api/children/${child.id}/tasks/${task.id}`, { method: "DELETE" }), "任務已刪除");
        });

        row.appendChild(deleteBtn);
        taskDiv.appendChild(row);
      }

      if (mode === "child" && !task.done) {
        if (task.needPhoto === "yes") {
          const label = document.createElement("label");
          label.textContent = "上傳完成照片";
          taskDiv.appendChild(label);

          const fileInput = document.createElement("input");
          fileInput.type = "file";
          fileInput.accept = "image/*";
          fileInput.addEventListener("change", event => uploadPhoto(child.id, task.id, event));
          taskDiv.appendChild(fileInput);
        }

        const finishBtn = document.createElement("button");
        finishBtn.type = "button";
        finishBtn.className = "btn-success";
        finishBtn.textContent = "完成任務";
        finishBtn.addEventListener("click", () => finishTask(child.id, task.id));
        taskDiv.appendChild(finishBtn);
      }

      return taskDiv;
    }

    async function runAction(action, successMessage) {
      try {
        await action();
        await loadData({ quiet: true });
        if (successMessage) showToast(successMessage);
      } catch (error) {
        showToast(error.message);
      }
    }

    async function uploadPhoto(childId, taskId, event) {
      const file = event.target.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append("photo", file);

      await runAction(async () => {
        const response = await fetch(`/api/children/${childId}/tasks/${taskId}/photo`, {
          method: "POST",
          body: formData
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.message || "照片上傳失敗");
      }, "照片已上傳");
    }

    async function finishTask(childId, taskId) {
      await runAction(() => api(`/api/children/${childId}/tasks/${taskId}/finish`, { method: "PUT" }), "");
      showReward();
    }

    function showReward() {
      const messages = [
        "做得很好，繼續保持。",
        "任務完成，今天又前進一步。",
        "漂亮，家裡的隊友收到成果了。",
        "完成得很棒，記得給自己一點掌聲。"
      ];
      rewardText.textContent = messages[Math.floor(Math.random() * messages.length)];
      rewardBox.style.display = "grid";
    }

    managerModeBtn.addEventListener("click", () => switchMode("manager"));
    childModeBtn.addEventListener("click", () => switchMode("child"));
    refreshBtn.addEventListener("click", () => loadData());

    saveManagerNameBtn.addEventListener("click", async () => {
      const managerName = managerNameInput.value.trim();
      if (!managerName) {
        showToast("請輸入家長名稱");
        return;
      }

      await runAction(() => api("/api/manager", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ managerName })
      }), "家長名稱已儲存");
    });

    addChildBtn.addEventListener("click", async () => {
      const name = childNameInput.value.trim();
      if (!name) {
        showToast("請輸入孩子名稱");
        return;
      }

      try {
        const child = await api("/api/children", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name })
        });

        selectedChildId = child.id;
        currentChildId = child.id;
        childNameInput.value = "";
        await loadData({ quiet: true });
        showToast("孩子已新增");
      } catch (error) {
        showToast(error.message);
      }
    });

    deleteChildBtn.addEventListener("click", async () => {
      const child = getSelectedChild();
      if (!child) return;
      if (!confirm(`確定要刪除 ${child.name} 與所有任務？`)) return;

      await runAction(() => api(`/api/children/${child.id}`, { method: "DELETE" }), "孩子已刪除");
    });

    sendTaskBtn.addEventListener("click", async () => {
      const child = getSelectedChild();
      if (!child) {
        showToast("請先選擇孩子");
        return;
      }

      const name = taskNameInput.value.trim();
      const note = taskNoteInput.value.trim();
      const needPhoto = needPhotoSelect.value;

      if (!name) {
        showToast("請輸入任務名稱");
        return;
      }

      await runAction(() => api(`/api/children/${child.id}/tasks`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, note, needPhoto })
      }), `任務已送給 ${child.name}`);

      taskNameInput.value = "";
      taskNoteInput.value = "";
      needPhotoSelect.value = "no";
    });

    childLoginBtn.addEventListener("click", () => {
      const childId = childLoginSelect.value;
      if (!childId) {
        showToast("目前沒有孩子可以登入");
        return;
      }

      currentChildId = childId;
      renderAll();
    });

    closeRewardBtn.addEventListener("click", () => {
      rewardBox.style.display = "none";
    });

    rewardBox.addEventListener("click", event => {
      if (event.target === rewardBox) {
        rewardBox.style.display = "none";
      }
    });

    loadData();
    setInterval(() => loadData({ quiet: true }), 5000);
  </script>
</body>
</html>
