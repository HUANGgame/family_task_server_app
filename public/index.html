<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>選擇身分 | Family Task Server App</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="role-screen">
      <section class="role-card" aria-labelledby="roleTitle">
        <h1 id="roleTitle">你是家長還是兒童？</h1>

        <div class="role-grid">
          <a class="role-option parent-option" href="/manager" aria-label="我是家長">
            <span class="role-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" focusable="false">
                <circle cx="32" cy="20" r="10"></circle>
                <path d="M15 56c2-14 11-22 17-22s15 8 17 22"></path>
                <path d="M20 42h24"></path>
                <path d="M44 18h10v16"></path>
                <path d="M54 18l-8-8"></path>
              </svg>
            </span>
            <span class="role-title">我是家長</span>
          </a>

          <a class="role-option child-option child-choice" href="/child" aria-label="我是兒童">
            <span class="role-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" focusable="false">
                <circle cx="32" cy="19" r="9"></circle>
                <path d="M18 55c2-13 10-20 14-20s12 7 14 20"></path>
                <path d="M15 27c4 5 8 7 13 7"></path>
                <path d="M49 27c-4 5-8 7-13 7"></path>
                <path d="M24 17h.1"></path>
                <path d="M40 17h.1"></path>
                <path d="M27 24c3 2 7 2 10 0"></path>
              </svg>
            </span>
            <span class="role-title child-role-title">
              <ruby>我<rt>ㄨㄛˇ</rt></ruby>
              <ruby>是<rt>ㄕˋ</rt></ruby>
              <ruby>兒<rt>ㄦˊ</rt></ruby>
              <ruby>童<rt>ㄊㄨㄥˊ</rt></ruby>
            </span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
