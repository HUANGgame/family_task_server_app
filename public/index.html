<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭任務積分</title>
  <style>
    :root {
      --bg: #f5f7f2;
      --panel: #ffffff;
      --ink: #222c28;
      --muted: #68746f;
      --line: #dbe3dd;
      --primary: #246a73;
      --primary-dark: #194f56;
      --gold: #d99a21;
      --green: #328158;
      --red: #b84f47;
      --soft: #eef5f2;
      --shadow: 0 10px 28px rgba(28, 46, 39, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
    }

    header {
      background: #173f45;
      color: white;
      padding: 22px 5vw;
    }

    .header-inner, .shell {
      width: min(1120px, 92vw);
      margin: 0 auto;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 4px; font-size: 28px; letter-spacing: 0; }
    h2 { margin-bottom: 14px; font-size: 21px; }
    h3 { margin-bottom: 10px; font-size: 17px; }
    header p { margin-bottom: 0; color: rgba(255, 255, 255, 0.78); }

    .shell { margin-top: 20px; margin-bottom: 42px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef2ec;
    }

    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      align-items: start;
    }

    .two-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel, .item, .task {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel { padding: 18px; }
    .item, .task { padding: 14px; box-shadow: none; }

    .stack { display: grid; gap: 12px; }
    .hidden { display: none !important; }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 14px;
      font-weight: 800;
    }

    input, textarea, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid #cbd5cf;
      border-radius: 8px;
      padding: 10px 11px;
      background: white;
      color: var(--ink);
      font: inherit;
    }

    textarea { min-height: 76px; resize: vertical; }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      padding: 9px 14px;
      background: var(--primary);
      color: white;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { background: var(--primary-dark); }
    button:disabled { cursor: not-allowed; opacity: 0.55; }

    .btn-light {
      border: 1px solid var(--line);
      background: white;
      color: var(--primary);
    }

    .btn-light:hover { background: var(--soft); }
    .btn-red { background: var(--red); }
    .btn-red:hover { background: #943d37; }
    .btn-green { background: var(--green); }
    .btn-green:hover { background: #276846; }
    .active-btn { background: var(--primary); color: white; }

    .row, .between {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .between { justify-content: space-between; }

    .muted {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .divider {
      height: 1px;
      margin: 18px 0;
      background: var(--line);
    }

    .child-button {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #fbfcfa;
      color: var(--ink);
    }

    .child-button.active, .child-button:hover {
      border-color: var(--primary);
      background: var(--soft);
    }

    .metric {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fafcf8;
      text-align: center;
      color: var(--muted);
    }

    .metric-box b {
      display: block;
      margin-bottom: 4px;
      color: var(--primary);
      font-size: 28px;
      line-height: 1;
    }

    .points {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      background: #fff3d7;
      color: #78510c;
      font-size: 13px;
      font-weight: 900;
    }

    .status {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      background: #fff3d7;
      color: #78510c;
      font-size: 13px;
      font-weight: 900;
    }

    .status.done { background: #dff3e6; color: #276846; }

    .task {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .task.done { background: #f4fbf6; border-color: #b9dcc6; }
    .task-title, .item-title { font-size: 17px; font-weight: 900; overflow-wrap: anywhere; }
    .task p, .item p { margin: 0; color: var(--muted); line-height: 1.55; overflow-wrap: anywhere; }

    .photo {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .empty {
      border: 1px dashed #c9d3cb;
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfa;
      color: var(--muted);
      line-height: 1.55;
    }

    .hero-points {
      border-radius: 8px;
      padding: 20px;
      background: #fff7e6;
      border: 1px solid #f1d18a;
      color: #6d4a0b;
    }

    .hero-points b {
      display: block;
      margin-top: 4px;
      font-size: 40px;
      line-height: 1;
      color: var(--gold);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(360px, calc(100vw - 36px));
      display: none;
      border-radius: 8px;
      padding: 12px 14px;
      background: #173f45;
      color: white;
      box-shadow: var(--shadow);
      z-index: 30;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .header-inner, .topbar { align-items: stretch; flex-direction: column; }
      .grid, .two-grid, .metric { grid-template-columns: 1fr; }
      .segmented { width: 100%; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>家庭任務積分</h1>
        <p>完成任務拿積分，累積後到商店兌換獎勵。</p>
      </div>
      <button id="refreshBtn" class="btn-light" type="button">重新整理</button>
    </div>
  </header>

  <main class="shell">
    <div class="topbar">
      <div class="segmented">
        <button id="managerModeBtn" class="active-btn" type="button">家長</button>
        <button id="childModeBtn" class="btn-light" type="button">孩子</button>
      </div>
      <p id="lastUpdatedText" class="muted">尚未同步</p>
    </div>

    <section id="managerPage">
      <div id="managerLoginPanel" class="panel">
        <h2>家長登入</h2>
        <p id="managerLoginHint" class="muted">第一次使用請設定家長名稱與密碼。</p>
        <div class="two-grid">
          <div>
            <label for="managerNameInput">家長名稱</label>
            <input id="managerNameInput" type="text" maxlength="120" placeholder="例如：媽媽">
          </div>
          <div>
            <label for="managerPasswordInput">家長密碼</label>
            <input id="managerPasswordInput" type="password" placeholder="至少 4 碼">
          </div>
        </div>
        <div class="row" style="margin-top: 12px;">
          <button id="managerLoginBtn" type="button">進入家長介面</button>
        </div>
      </div>

      <div id="managerDashboard" class="hidden">
        <div class="grid">
          <aside class="panel">
            <div class="between">
              <h2>孩子</h2>
              <button id="managerLogoutBtn" class="btn-light" type="button">登出</button>
            </div>

            <label for="childNameInput">新增孩子</label>
            <input id="childNameInput" type="text" maxlength="120" placeholder="孩子名稱">
            <button id="addChildBtn" type="button" style="margin-top: 10px;">新增</button>

            <div class="divider"></div>
            <div id="childListForManager" class="stack"></div>
          </aside>

          <section class="stack">
            <div class="panel">
              <div class="between">
                <h2 id="selectedChildTitle">選擇孩子</h2>
                <button id="deleteChildBtn" class="btn-red hidden" type="button">刪除孩子</button>
              </div>

              <div id="managerWorkArea" class="hidden">
                <div class="metric">
                  <div class="metric-box"><b id="childPointCount">0</b>目前積分</div>
                  <div class="metric-box"><b id="totalCount">0</b>任務</div>
                  <div class="metric-box"><b id="doneCount">0</b>完成</div>
                </div>

                <h3>派任務</h3>
                <div class="two-grid">
                  <div>
                    <label for="taskNameInput">任務名稱</label>
                    <input id="taskNameInput" type="text" maxlength="120" placeholder="例如：整理書桌">
                  </div>
                  <div>
                    <label for="taskPointsInput">此次任務積分</label>
                    <input id="taskPointsInput" type="number" min="1" step="1" value="5">
                  </div>
                </div>
                <label for="taskNoteInput">說明</label>
                <textarea id="taskNoteInput" maxlength="500" placeholder="簡短說明即可"></textarea>
                <label for="needPhotoSelect">照片</label>
                <select id="needPhotoSelect">
                  <option value="no">不需要</option>
                  <option value="yes">需要上傳照片</option>
                </select>
                <button id="sendTaskBtn" type="button" style="margin-top: 12px;">送出任務</button>

                <div class="divider"></div>
                <h3>任務列表</h3>
                <div id="managerTaskList"></div>
              </div>
            </div>

            <div class="two-grid">
              <div class="panel">
                <h2>上架商品</h2>
                <label for="shopNameInput">商品名稱</label>
                <input id="shopNameInput" type="text" maxlength="120" placeholder="例如：看卡通 30 分鐘">
                <div class="two-grid">
                  <div>
                    <label for="shopCostInput">需要積分</label>
                    <input id="shopCostInput" type="number" min="1" step="1" value="20">
                  </div>
                  <div>
                    <label for="shopStockInput">數量</label>
                    <input id="shopStockInput" type="number" min="0" step="1" value="1">
                  </div>
                </div>
                <label for="shopDescriptionInput">說明</label>
                <textarea id="shopDescriptionInput" maxlength="500" placeholder="可留空"></textarea>
                <button id="addShopItemBtn" type="button" style="margin-top: 12px;">上架</button>
              </div>

              <div class="panel">
                <h2>商店商品</h2>
                <div id="managerShopList" class="stack"></div>
              </div>
            </div>

            <div class="panel">
              <h2>兌換紀錄</h2>
              <div id="redemptionList" class="stack"></div>
            </div>
          </section>
        </div>
      </div>
    </section>

    <section id="childPage" class="hidden">
      <div class="grid">
        <aside class="panel">
          <h2>孩子入口</h2>
          <label for="childLoginSelect">我是誰</label>
          <select id="childLoginSelect"></select>
          <button id="childLoginBtn" type="button" style="margin-top: 10px;">進入</button>
          <div id="childPointBox" class="hero-points hidden" style="margin-top: 16px;">
            目前積分
            <b id="childPointText">0</b>
          </div>
        </aside>

        <section class="stack">
          <div class="panel">
            <h2 id="childTitle">我的任務</h2>
            <div id="childTaskList" class="empty">請先選擇孩子</div>
          </div>

          <div class="panel">
            <h2>獎勵商店</h2>
            <div id="childShopList" class="stack"></div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status"></div>

  <script>
    let appData = { managerName: "", hasManagerPassword: false, children: [], shop: [], redemptions: [] };
    let managerPassword = sessionStorage.getItem("managerPassword") || "";
    let managerUnlocked = Boolean(managerPassword);
    let selectedChildId = "";
    let currentChildId = "";
    let toastTimer = null;

    const $ = id => document.getElementById(id);

    const managerModeBtn = $("managerModeBtn");
    const childModeBtn = $("childModeBtn");
    const managerPage = $("managerPage");
    const childPage = $("childPage");
    const refreshBtn = $("refreshBtn");
    const lastUpdatedText = $("lastUpdatedText");

    const managerLoginPanel = $("managerLoginPanel");
    const managerDashboard = $("managerDashboard");
    const managerLoginHint = $("managerLoginHint");
    const managerNameInput = $("managerNameInput");
    const managerPasswordInput = $("managerPasswordInput");
    const managerLoginBtn = $("managerLoginBtn");
    const managerLogoutBtn = $("managerLogoutBtn");

    const childNameInput = $("childNameInput");
    const addChildBtn = $("addChildBtn");
    const childListForManager = $("childListForManager");
    const deleteChildBtn = $("deleteChildBtn");
    const selectedChildTitle = $("selectedChildTitle");
    const managerWorkArea = $("managerWorkArea");
    const childPointCount = $("childPointCount");
    const totalCount = $("totalCount");
    const doneCount = $("doneCount");
    const taskNameInput = $("taskNameInput");
    const taskPointsInput = $("taskPointsInput");
    const taskNoteInput = $("taskNoteInput");
    const needPhotoSelect = $("needPhotoSelect");
    const sendTaskBtn = $("sendTaskBtn");
    const managerTaskList = $("managerTaskList");

    const shopNameInput = $("shopNameInput");
    const shopCostInput = $("shopCostInput");
    const shopStockInput = $("shopStockInput");
    const shopDescriptionInput = $("shopDescriptionInput");
    const addShopItemBtn = $("addShopItemBtn");
    const managerShopList = $("managerShopList");
    const redemptionList = $("redemptionList");

    const childLoginSelect = $("childLoginSelect");
    const childLoginBtn = $("childLoginBtn");
    const childPointBox = $("childPointBox");
    const childPointText = $("childPointText");
    const childTitle = $("childTitle");
    const childTaskList = $("childTaskList");
    const childShopList = $("childShopList");
    const toast = $("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.style.display = "block";
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.style.display = "none";
      }, 2600);
    }

    async function api(url, options = {}) {
      const headers = { ...(options.headers || {}) };
      if (managerPassword) headers["X-Manager-Password"] = managerPassword;
      const response = await fetch(url, { ...options, headers });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || "操作失敗");
      return data;
    }

    async function loadData({ quiet = false } = {}) {
      try {
        appData = await api("/api/data");
        if (selectedChildId && !appData.children.some(child => child.id === selectedChildId)) selectedChildId = "";
        if (currentChildId && !appData.children.some(child => child.id === currentChildId)) currentChildId = "";
        renderAll();
        lastUpdatedText.textContent = `已同步 ${new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" })}`;
      } catch (error) {
        if (!quiet) showToast(error.message);
      }
    }

    function empty(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function textNode(tag, className, value) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      node.textContent = value;
      return node;
    }

    function getSelectedChild() {
      return appData.children.find(child => child.id === selectedChildId);
    }

    function getCurrentChild() {
      return appData.children.find(child => child.id === currentChildId);
    }

    function switchMode(mode) {
      const manager = mode === "manager";
      managerPage.classList.toggle("hidden", !manager);
      childPage.classList.toggle("hidden", manager);
      managerModeBtn.classList.toggle("active-btn", manager);
      managerModeBtn.classList.toggle("btn-light", !manager);
      childModeBtn.classList.toggle("active-btn", !manager);
      childModeBtn.classList.toggle("btn-light", manager);
      renderAll();
    }

    function renderAll() {
      renderManagerGate();
      renderChildrenForManager();
      renderManagerWorkArea();
      renderManagerShop();
      renderRedemptions();
      renderChildOptions();
      renderChildView();
    }

    function renderManagerGate() {
      managerLoginHint.textContent = appData.hasManagerPassword
        ? "請輸入家長密碼。"
        : "第一次使用請設定家長名稱與至少 4 碼密碼。";
      managerNameInput.value = appData.managerName || managerNameInput.value;
      managerNameInput.disabled = appData.hasManagerPassword && managerUnlocked;
      managerLoginPanel.classList.toggle("hidden", managerUnlocked);
      managerDashboard.classList.toggle("hidden", !managerUnlocked);
    }

    function renderChildrenForManager() {
      empty(childListForManager);
      if (!appData.children.length) {
        childListForManager.appendChild(textNode("div", "empty", "還沒有孩子"));
        return;
      }

      appData.children.forEach(child => {
        const done = child.tasks.filter(task => task.done).length;
        const button = document.createElement("button");
        button.type = "button";
        button.className = child.id === selectedChildId ? "child-button active" : "child-button";
        button.appendChild(textNode("div", "task-title", child.name));
        button.appendChild(textNode("div", "muted", `${child.points} 分 · 任務 ${child.tasks.length} · 完成 ${done}`));
        button.addEventListener("click", () => {
          selectedChildId = child.id;
          renderAll();
        });
        childListForManager.appendChild(button);
      });
    }

    function renderManagerWorkArea() {
      const child = getSelectedChild();
      if (!child) {
        selectedChildTitle.textContent = "選擇孩子";
        managerWorkArea.classList.add("hidden");
        deleteChildBtn.classList.add("hidden");
        return;
      }

      selectedChildTitle.textContent = child.name;
      managerWorkArea.classList.remove("hidden");
      deleteChildBtn.classList.remove("hidden");
      childPointCount.textContent = child.points;
      totalCount.textContent = child.tasks.length;
      doneCount.textContent = child.tasks.filter(task => task.done).length;

      empty(managerTaskList);
      if (!child.tasks.length) {
        managerTaskList.appendChild(textNode("div", "empty", "目前沒有任務"));
        return;
      }

      child.tasks.forEach(task => managerTaskList.appendChild(taskCard(child, task, "manager")));
    }

    function renderManagerShop() {
      empty(managerShopList);
      if (!appData.shop.length) {
        managerShopList.appendChild(textNode("div", "empty", "尚未上架商品"));
        return;
      }

      appData.shop.forEach(item => {
        const card = document.createElement("div");
        card.className = "item";
        card.appendChild(textNode("div", "item-title", item.name));
        card.appendChild(textNode("p", "", item.description || "沒有說明"));
        const row = document.createElement("div");
        row.className = "between";
        row.appendChild(textNode("span", "points", `${item.cost} 分`));
        row.appendChild(textNode("span", "muted", `剩 ${item.stock}`));
        card.appendChild(row);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn-red";
        btn.textContent = "下架";
        btn.addEventListener("click", () => runAction(() => api(`/api/shop/${item.id}`, { method: "DELETE" }), "商品已下架"));
        card.appendChild(btn);
        managerShopList.appendChild(card);
      });
    }

    function renderRedemptions() {
      empty(redemptionList);
      if (!appData.redemptions.length) {
        redemptionList.appendChild(textNode("div", "empty", "還沒有兌換紀錄"));
        return;
      }

      appData.redemptions.forEach(record => {
        const item = document.createElement("div");
        item.className = "item";
        item.appendChild(textNode("div", "item-title", `${record.childName} 兌換 ${record.itemName}`));
        item.appendChild(textNode("p", "", `${record.cost} 分 · ${record.createdAt}`));
        redemptionList.appendChild(item);
      });
    }

    function renderChildOptions() {
      empty(childLoginSelect);
      if (!appData.children.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "尚未建立孩子";
        childLoginSelect.appendChild(option);
        return;
      }

      appData.children.forEach(child => {
        const option = document.createElement("option");
        option.value = child.id;
        option.textContent = child.name;
        childLoginSelect.appendChild(option);
      });
      if (currentChildId) childLoginSelect.value = currentChildId;
    }

    function renderChildView() {
      const child = getCurrentChild();
      childPointBox.classList.toggle("hidden", !child);
      empty(childTaskList);
      empty(childShopList);

      if (!child) {
        childTitle.textContent = "我的任務";
        childTaskList.className = "empty";
        childTaskList.textContent = "請先選擇孩子";
        childShopList.appendChild(textNode("div", "empty", "請先選擇孩子"));
        return;
      }

      childPointText.textContent = child.points;
      childTitle.textContent = `${child.name} 的任務`;
      childTaskList.className = "";

      if (!child.tasks.length) {
        childTaskList.className = "empty";
        childTaskList.textContent = "目前沒有任務";
      } else {
        child.tasks.forEach(task => childTaskList.appendChild(taskCard(child, task, "child")));
      }

      const activeShop = appData.shop.filter(item => item.active);
      if (!activeShop.length) {
        childShopList.appendChild(textNode("div", "empty", "商店還沒有商品"));
      } else {
        activeShop.forEach(item => childShopList.appendChild(shopCardForChild(child, item)));
      }
    }

    function taskCard(child, task, mode) {
      const card = document.createElement("article");
      card.className = task.done ? "task done" : "task";
      card.appendChild(textNode("div", "task-title", task.name));
      card.appendChild(textNode("p", "", task.note));
      const meta = document.createElement("div");
      meta.className = "row";
      meta.appendChild(textNode("span", "points", `${task.points} 分`));
      meta.appendChild(textNode("span", task.done ? "status done" : "status", task.done ? "已完成" : "待完成"));
      meta.appendChild(textNode("span", "muted", task.needPhoto === "yes" ? "需要照片" : "不需照片"));
      card.appendChild(meta);

      if (task.completedAt) card.appendChild(textNode("p", "", `完成：${task.completedAt}`));
      if (task.photo) {
        const img = document.createElement("img");
        img.className = "photo";
        img.src = task.photo;
        img.alt = `${task.name} 的照片`;
        card.appendChild(img);
      }

      if (mode === "manager") {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn-red";
        btn.textContent = "刪除任務";
        btn.addEventListener("click", () => {
          if (confirm("確定刪除這個任務？")) {
            runAction(() => api(`/api/children/${child.id}/tasks/${task.id}`, { method: "DELETE" }), "任務已刪除");
          }
        });
        card.appendChild(btn);
      }

      if (mode === "child" && !task.done) {
        if (task.needPhoto === "yes") {
          const label = document.createElement("label");
          label.textContent = "上傳照片";
          card.appendChild(label);
          const input = document.createElement("input");
          input.type = "file";
          input.accept = "image/*";
          input.addEventListener("change", event => uploadPhoto(child.id, task.id, event));
          card.appendChild(input);
        }

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn-green";
        btn.textContent = `完成並得到 ${task.points} 分`;
        btn.addEventListener("click", () => finishTask(child.id, task.id));
        card.appendChild(btn);
      }

      return card;
    }

    function shopCardForChild(child, item) {
      const card = document.createElement("div");
      card.className = "item";
      card.appendChild(textNode("div", "item-title", item.name));
      card.appendChild(textNode("p", "", item.description || "沒有說明"));
      const row = document.createElement("div");
      row.className = "between";
      row.appendChild(textNode("span", "points", `${item.cost} 分`));
      row.appendChild(textNode("span", "muted", `剩 ${item.stock}`));
      card.appendChild(row);
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = child.points >= item.cost ? "兌換" : "積分不夠";
      btn.disabled = child.points < item.cost || item.stock < 1;
      btn.addEventListener("click", () => runAction(() => api(`/api/children/${child.id}/redeem/${item.id}`, { method: "POST" }), "兌換成功，請找家長領取"));
      card.appendChild(btn);
      return card;
    }

    async function runAction(action, successMessage) {
      try {
        await action();
        await loadData({ quiet: true });
        if (successMessage) showToast(successMessage);
      } catch (error) {
        showToast(error.message);
      }
    }

    async function uploadPhoto(childId, taskId, event) {
      const file = event.target.files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append("photo", file);
      await runAction(async () => {
        const response = await fetch(`/api/children/${childId}/tasks/${taskId}/photo`, { method: "POST", body: formData });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.message || "照片上傳失敗");
      }, "照片已上傳");
    }

    async function finishTask(childId, taskId) {
      try {
        const result = await api(`/api/children/${childId}/tasks/${taskId}/finish`, { method: "PUT" });
        await loadData({ quiet: true });
        showToast(`完成任務，得到 ${result.earnedPoints} 分`);
      } catch (error) {
        showToast(error.message);
      }
    }

    managerLoginBtn.addEventListener("click", async () => {
      const password = managerPasswordInput.value.trim();
      if (!password) {
        showToast("請輸入家長密碼");
        return;
      }

      try {
        if (!appData.hasManagerPassword) {
          const managerName = managerNameInput.value.trim();
          if (!managerName) throw new Error("請輸入家長名稱");
          await api("/api/manager", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ managerName, newPassword: password, managerPassword: password })
          });
        } else {
          await api("/api/manager/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password })
          });
        }

        managerPassword = password;
        sessionStorage.setItem("managerPassword", password);
        managerUnlocked = true;
        managerPasswordInput.value = "";
        await loadData({ quiet: true });
        showToast("已進入家長介面");
      } catch (error) {
        showToast(error.message);
      }
    });

    managerLogoutBtn.addEventListener("click", () => {
      managerPassword = "";
      managerUnlocked = false;
      sessionStorage.removeItem("managerPassword");
      renderAll();
    });

    managerModeBtn.addEventListener("click", () => switchMode("manager"));
    childModeBtn.addEventListener("click", () => switchMode("child"));
    refreshBtn.addEventListener("click", () => loadData());

    addChildBtn.addEventListener("click", async () => {
      const name = childNameInput.value.trim();
      if (!name) return showToast("請輸入孩子名稱");
      try {
        const child = await api("/api/children", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name })
        });
        selectedChildId = child.id;
        currentChildId = child.id;
        childNameInput.value = "";
        await loadData({ quiet: true });
        showToast("孩子已新增");
      } catch (error) {
        showToast(error.message);
      }
    });

    deleteChildBtn.addEventListener("click", () => {
      const child = getSelectedChild();
      if (!child) return;
      if (confirm(`確定刪除 ${child.name}？`)) {
        runAction(() => api(`/api/children/${child.id}`, { method: "DELETE" }), "孩子已刪除");
      }
    });

    sendTaskBtn.addEventListener("click", async () => {
      const child = getSelectedChild();
      if (!child) return showToast("請先選擇孩子");
      const name = taskNameInput.value.trim();
      if (!name) return showToast("請輸入任務名稱");

      await runAction(() => api(`/api/children/${child.id}/tasks`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name,
          note: taskNoteInput.value.trim(),
          points: taskPointsInput.value,
          needPhoto: needPhotoSelect.value
        })
      }), "任務已送出");

      taskNameInput.value = "";
      taskNoteInput.value = "";
      taskPointsInput.value = "5";
      needPhotoSelect.value = "no";
    });

    addShopItemBtn.addEventListener("click", async () => {
      const name = shopNameInput.value.trim();
      if (!name) return showToast("請輸入商品名稱");

      await runAction(() => api("/api/shop", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name,
          description: shopDescriptionInput.value.trim(),
          cost: shopCostInput.value,
          stock: shopStockInput.value
        })
      }), "商品已上架");

      shopNameInput.value = "";
      shopDescriptionInput.value = "";
      shopCostInput.value = "20";
      shopStockInput.value = "1";
    });

    childLoginBtn.addEventListener("click", () => {
      const childId = childLoginSelect.value;
      if (!childId) return showToast("目前沒有孩子");
      currentChildId = childId;
      renderAll();
      showToast("已進入孩子介面");
    });

    loadData();
    setInterval(() => loadData({ quiet: true }), 5000);
  </script>
</body>
</html>
