<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Family Task Server App</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">FT</span>
          <span>Family Task Server App</span>
        </div>
        <nav class="nav-actions">
          <a class="btn secondary" href="/manager">Manager</a>
          <a class="btn good" href="/child">Child</a>
        </nav>
      </header>

      <main class="hero">
        <section class="hero-panel">
          <div>
            <h1>Family Task Server App</h1>
            <p>家長建立家庭與任務，孩子完成任務、上傳照片、累積點數並兌換獎勵。資料儲存在 Supabase PostgreSQL，照片存到 Supabase Storage，適合部署到 Render Web Service。</p>
            <div class="button-row">
              <a class="btn good" href="/manager">家長管理</a>
              <a class="btn secondary" href="/child">孩子任務</a>
            </div>
          </div>
          <div class="hero-art" aria-label="task preview">
            <div class="check-row">
              <span class="check-icon">✓</span>
              <div>
                <strong>整理餐桌</strong>
                <div class="small muted">需要照片</div>
              </div>
              <span class="points-pill">+3</span>
            </div>
            <div class="check-row">
              <span class="check-icon">✓</span>
              <div>
                <strong>閱讀 15 分鐘</strong>
                <div class="small muted">學習</div>
              </div>
              <span class="points-pill">+2</span>
            </div>
            <div class="check-row">
              <span class="check-icon">○</span>
              <div>
                <strong>準備明天書包</strong>
                <div class="small muted">生活</div>
              </div>
              <span class="points-pill">+1</span>
            </div>
            <div class="check-row">
              <span class="check-icon">★</span>
              <div>
                <strong>兌換家庭電影夜</strong>
                <div class="small muted">獎勵商店</div>
              </div>
              <span class="points-pill">20</span>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
