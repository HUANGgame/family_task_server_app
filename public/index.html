<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭任務積分</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1390184360967578"
    crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #f5f7f2;
      --panel: #fff;
      --ink: #222c28;
      --muted: #68746f;
      --line: #dbe3dd;
      --primary: #246a73;
      --primary-dark: #194f56;
      --gold: #d99a21;
      --green: #328158;
      --red: #b84f47;
      --soft: #eef5f2;
      --shadow: 0 10px 28px rgba(28, 46, 39, 0.1);
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif; }
    header { background: #173f45; color: white; padding: 22px 5vw; }
    .header-inner, .shell { width: min(1120px, 92vw); margin: 0 auto; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 4px; font-size: 28px; letter-spacing: 0; }
    h2 { margin-bottom: 14px; font-size: 21px; }
    h3 { margin-bottom: 10px; font-size: 17px; }
    header p { margin-bottom: 0; color: rgba(255,255,255,.78); }
    .shell { margin-top: 20px; margin-bottom: 42px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
    .segmented { display: inline-grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 4px; border: 1px solid var(--line); border-radius: 8px; background: #eef2ec; }
    .grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
    .two-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
    .panel, .item, .task { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    .panel { padding: 18px; }
    .item, .task { padding: 14px; box-shadow: none; }
    .stack { display: grid; gap: 12px; }
    .hidden { display: none !important; }
    label { display: block; margin: 12px 0 6px; font-size: 14px; font-weight: 800; }
    input, textarea, select { width: 100%; min-height: 42px; border: 1px solid #cbd5cf; border-radius: 8px; padding: 10px 11px; background: white; color: var(--ink); font: inherit; }
    textarea { min-height: 76px; resize: vertical; }
    button { min-height: 40px; border: 0; border-radius: 8px; padding: 9px 14px; background: var(--primary); color: white; font: inherit; font-weight: 800; cursor: pointer; }
    button:hover { background: var(--primary-dark); }
    button:disabled { cursor: not-allowed; opacity: .55; }
    .btn-light { border: 1px solid var(--line); background: white; color: var(--primary); }
    .btn-light:hover { background: var(--soft); }
    .btn-red { background: var(--red); }
    .btn-red:hover { background: #943d37; }
    .btn-green { background: var(--green); }
    .btn-green:hover { background: #276846; }
    .active-btn { background: var(--primary); color: white; }
    .row, .between { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .between { justify-content: space-between; }
    .muted { color: var(--muted); font-size: 14px; line-height: 1.55; }
    .divider { height: 1px; margin: 18px 0; background: var(--line); }
    .child-button { width: 100%; text-align: left; border: 1px solid var(--line); background: #fbfcfa; color: var(--ink); }
    .child-button.active, .child-button:hover { border-color: var(--primary); background: var(--soft); }
    .metric { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .metric-box { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #fafcf8; text-align: center; color: var(--muted); }
    .metric-box b { display: block; margin-bottom: 4px; color: var(--primary); font-size: 28px; line-height: 1; }
    .points, .status { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 10px; background: #fff3d7; color: #78510c; font-size: 13px; font-weight: 900; }
    .status.done { background: #dff3e6; color: #276846; }
    .task { display: grid; gap: 9px; margin-top: 12px; }
    .task.done { background: #f4fbf6; border-color: #b9dcc6; }
    .task-title, .item-title { font-size: 17px; font-weight: 900; overflow-wrap: anywhere; }
    .task p, .item p { margin: 0; color: var(--muted); line-height: 1.55; overflow-wrap: anywhere; }
    .photo { width: 100%; max-height: 260px; object-fit: cover; border: 1px solid var(--line); border-radius: 8px; }
    .empty { border: 1px dashed #c9d3cb; border-radius: 8px; padding: 14px; background: #fbfcfa; color: var(--muted); line-height: 1.55; }
    .hero-points { border-radius: 8px; padding: 20px; background: #fff7e6; border: 1px solid #f1d18a; color: #6d4a0b; }
    .hero-points b { display: block; margin-top: 4px; font-size: 40px; line-height: 1; color: var(--gold); }
    .toast { position: fixed; right: 18px; bottom: 18px; max-width: min(360px, calc(100vw - 36px)); display: none; border-radius: 8px; padding: 12px 14px; background: #173f45; color: white; box-shadow: var(--shadow); z-index: 30; line-height: 1.5; }
    @media (max-width: 900px) {
      .header-inner, .topbar { align-items: stretch; flex-direction: column; }
      .grid, .two-grid, .metric { grid-template-columns: 1fr; }
      .segmented { width: 100%; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>家庭任務積分</h1>
        <p>任務、獎勵、罰單與商店，放在一個簡單介面。</p>
      </div>
      <button id="refreshBtn" class="btn-light" type="button">重新整理</button>
    </div>
  </header>

  <main class="shell">
    <div class="topbar">
      <div class="segmented">
        <button id="managerModeBtn" class="active-btn" type="button">家長</button>
        <button id="childModeBtn" class="btn-light" type="button">孩子</button>
      </div>
      <p id="lastUpdatedText" class="muted">尚未同步</p>
    </div>

    <section id="managerPage">
      <div id="managerLoginPanel" class="panel">
        <h2>家長登入</h2>
        <p id="managerLoginHint" class="muted">第一次使用請設定家長名稱、密碼與忘記密碼驗證答案。</p>
        <div class="two-grid">
          <div>
            <label for="managerNameInput">家長名稱</label>
            <input id="managerNameInput" type="text" maxlength="120" placeholder="例如：媽媽">
          </div>
          <div>
            <label for="managerPasswordInput">家長密碼</label>
            <input id="managerPasswordInput" type="password" placeholder="至少 4 碼">
          </div>
        </div>
        <div id="firstSetupRecovery">
          <label for="recoveryAnswerInput">忘記密碼驗證答案</label>
          <input id="recoveryAnswerInput" type="text" maxlength="80" placeholder="只有家長知道的答案">
        </div>
        <div class="row" style="margin-top: 12px;">
          <button id="managerLoginBtn" type="button">進入家長介面</button>
          <button id="showResetBtn" class="btn-light" type="button">忘記密碼</button>
        </div>
      </div>

      <div id="resetPasswordPanel" class="panel hidden" style="margin-top: 16px;">
        <h2>重設家長密碼</h2>
        <p class="muted">輸入家長名稱與驗證答案後，可以設定新密碼。</p>
        <div class="two-grid">
          <div>
            <label for="resetNameInput">家長名稱</label>
            <input id="resetNameInput" type="text" maxlength="120">
          </div>
          <div>
            <label for="resetAnswerInput">驗證答案</label>
            <input id="resetAnswerInput" type="text" maxlength="80">
          </div>
        </div>
        <label for="resetPasswordInput">新密碼</label>
        <input id="resetPasswordInput" type="password" placeholder="至少 4 碼">
        <div class="row" style="margin-top: 12px;">
          <button id="resetPasswordBtn" type="button">更新密碼</button>
          <button id="hideResetBtn" class="btn-light" type="button">取消</button>
        </div>
      </div>

      <div id="managerDashboard" class="hidden">
        <div class="grid">
          <aside class="panel">
            <div class="between">
              <h2>孩子</h2>
              <button id="managerLogoutBtn" class="btn-light" type="button">登出</button>
            </div>
            <label for="childNameInput">新增孩子</label>
            <input id="childNameInput" type="text" maxlength="120" placeholder="孩子名稱">
            <button id="addChildBtn" type="button" style="margin-top: 10px;">新增</button>
            <div class="divider"></div>
            <div id="childListForManager" class="stack"></div>
          </aside>

          <section class="stack">
            <div class="panel">
              <div class="between">
                <h2 id="selectedChildTitle">選擇孩子</h2>
                <button id="deleteChildBtn" class="btn-red hidden" type="button">刪除孩子</button>
              </div>
              <div id="managerWorkArea" class="hidden">
                <div class="metric">
                  <div class="metric-box"><b id="childPointCount">0</b>目前積分</div>
                  <div class="metric-box"><b id="totalCount">0</b>任務</div>
                  <div class="metric-box"><b id="fineCount">0</b>罰單</div>
                </div>
                <div class="two-grid">
                  <div>
                    <h3>派任務</h3>
                    <label for="taskNameInput">任務名稱</label>
                    <input id="taskNameInput" type="text" maxlength="120" placeholder="例如：整理書桌">
                    <label for="taskPointsInput">任務積分</label>
                    <input id="taskPointsInput" type="number" min="1" step="1" value="5">
                    <label for="taskNoteInput">說明</label>
                    <textarea id="taskNoteInput" maxlength="500" placeholder="簡短說明即可"></textarea>
                    <label for="needPhotoSelect">照片</label>
                    <select id="needPhotoSelect">
                      <option value="no">不需要</option>
                      <option value="yes">需要上傳照片</option>
                    </select>
                    <button id="sendTaskBtn" type="button" style="margin-top: 12px;">送出任務</button>
                  </div>
                  <div>
                    <h3>開罰單</h3>
                    <label for="finePointsInput">扣幾分</label>
                    <input id="finePointsInput" type="number" min="1" step="1" value="3">
                    <label for="fineReasonInput">原因</label>
                    <textarea id="fineReasonInput" maxlength="500" placeholder="例如：沒有收玩具"></textarea>
                    <button id="addFineBtn" class="btn-red" type="button" style="margin-top: 12px;">直接扣分</button>
                  </div>
                </div>
                <div class="divider"></div>
                <div class="two-grid">
                  <div>
                    <h3>任務列表</h3>
                    <div id="managerTaskList"></div>
                  </div>
                  <div>
                    <h3>罰單紀錄</h3>
                    <div id="managerFineList" class="stack"></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="two-grid">
              <div class="panel">
                <h2>上架商品</h2>
                <label for="shopNameInput">商品名稱</label>
                <input id="shopNameInput" type="text" maxlength="120" placeholder="例如：看卡通 30 分鐘">
                <div class="two-grid">
                  <div>
                    <label for="shopCostInput">需要積分</label>
                    <input id="shopCostInput" type="number" min="1" step="1" value="20">
                  </div>
                  <div>
                    <label for="shopStockInput">數量</label>
                    <input id="shopStockInput" type="number" min="0" step="1" value="1">
                  </div>
                </div>
                <label for="shopDescriptionInput">說明</label>
                <textarea id="shopDescriptionInput" maxlength="500" placeholder="可留空"></textarea>
                <button id="addShopItemBtn" type="button" style="margin-top: 12px;">上架</button>
              </div>
              <div class="panel">
                <h2>商店商品</h2>
                <div id="managerShopList" class="stack"></div>
              </div>
            </div>

            <div class="panel">
              <h2>兌換紀錄</h2>
              <div id="redemptionList" class="stack"></div>
            </div>
          </section>
        </div>
      </div>
    </section>

    <section id="childPage" class="hidden">
      <div class="grid">
        <aside class="panel">
          <h2>孩子入口</h2>
          <label for="childLoginSelect">我是誰</label>
          <select id="childLoginSelect"></select>
          <button id="childLoginBtn" type="button" style="margin-top: 10px;">進入</button>
          <div id="childPointBox" class="hero-points hidden" style="margin-top: 16px;">
            目前積分
            <b id="childPointText">0</b>
          </div>
        </aside>
        <section class="stack">
          <div class="panel">
            <h2 id="childTitle">我的任務</h2>
            <div id="childTaskList" class="empty">請先選擇孩子</div>
          </div>
          <div class="panel">
            <h2>我的罰單</h2>
            <div id="childFineList" class="stack"></div>
          </div>
          <div class="panel">
            <h2>獎勵商店</h2>
            <div id="childShopList" class="stack"></div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status"></div>

  <script>
    let appData = { managerName: "", hasManagerPassword: false, hasRecoveryAnswer: false, children: [], shop: [], redemptions: [], fines: [] };
    let managerPassword = sessionStorage.getItem("managerPassword") || "";
    let managerUnlocked = Boolean(managerPassword);
    let selectedChildId = "";
    let currentChildId = "";
    let toastTimer = null;

    const $ = id => document.getElementById(id);
    const ids = [
      "managerModeBtn","childModeBtn","managerPage","childPage","refreshBtn","lastUpdatedText","managerLoginPanel","resetPasswordPanel","managerDashboard","managerLoginHint","managerNameInput","managerPasswordInput","recoveryAnswerInput","firstSetupRecovery","managerLoginBtn","showResetBtn","hideResetBtn","resetNameInput","resetAnswerInput","resetPasswordInput","resetPasswordBtn","managerLogoutBtn","childNameInput","addChildBtn","childListForManager","deleteChildBtn","selectedChildTitle","managerWorkArea","childPointCount","totalCount","fineCount","taskNameInput","taskPointsInput","taskNoteInput","needPhotoSelect","sendTaskBtn","managerTaskList","finePointsInput","fineReasonInput","addFineBtn","managerFineList","shopNameInput","shopCostInput","shopStockInput","shopDescriptionInput","addShopItemBtn","managerShopList","redemptionList","childLoginSelect","childLoginBtn","childPointBox","childPointText","childTitle","childTaskList","childFineList","childShopList","toast"
    ];
    const el = Object.fromEntries(ids.map(id => [id, $(id)]));

    function showToast(message) {
      el.toast.textContent = message;
      el.toast.style.display = "block";
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.toast.style.display = "none"; }, 2600);
    }

    async function api(url, options = {}) {
      const headers = { ...(options.headers || {}) };
      if (managerPassword) headers["X-Manager-Password"] = managerPassword;
      const response = await fetch(url, { ...options, headers });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || "操作失敗");
      return data;
    }

    async function loadData({ quiet = false } = {}) {
      try {
        appData = await api("/api/data");
        if (selectedChildId && !appData.children.some(child => child.id === selectedChildId)) selectedChildId = "";
        if (currentChildId && !appData.children.some(child => child.id === currentChildId)) currentChildId = "";
        renderAll();
        el.lastUpdatedText.textContent = `已同步 ${new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" })}`;
      } catch (error) {
        if (!quiet) showToast(error.message);
      }
    }

    function empty(node) { while (node.firstChild) node.removeChild(node.firstChild); }
    function textNode(tag, className, value) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      node.textContent = value;
      return node;
    }
    function getSelectedChild() { return appData.children.find(child => child.id === selectedChildId); }
    function getCurrentChild() { return appData.children.find(child => child.id === currentChildId); }
    function finesForChild(childId) { return appData.fines.filter(fine => fine.childId === childId); }

    function switchMode(mode) {
      const manager = mode === "manager";
      el.managerPage.classList.toggle("hidden", !manager);
      el.childPage.classList.toggle("hidden", manager);
      el.managerModeBtn.classList.toggle("active-btn", manager);
      el.managerModeBtn.classList.toggle("btn-light", !manager);
      el.childModeBtn.classList.toggle("active-btn", !manager);
      el.childModeBtn.classList.toggle("btn-light", manager);
      renderAll();
    }

    function renderAll() {
      renderManagerGate();
      renderChildrenForManager();
      renderManagerWorkArea();
      renderManagerShop();
      renderRedemptions();
      renderChildOptions();
      renderChildView();
    }

    function renderManagerGate() {
      el.managerLoginHint.textContent = appData.hasManagerPassword ? "請輸入家長密碼。" : "第一次使用請設定家長名稱、密碼與忘記密碼驗證答案。";
      el.managerNameInput.value = appData.managerName || el.managerNameInput.value;
      el.managerNameInput.disabled = appData.hasManagerPassword && managerUnlocked;
      el.firstSetupRecovery.classList.toggle("hidden", appData.hasManagerPassword);
      el.managerLoginPanel.classList.toggle("hidden", managerUnlocked);
      el.managerDashboard.classList.toggle("hidden", !managerUnlocked);
    }

    function renderChildrenForManager() {
      empty(el.childListForManager);
      if (!appData.children.length) {
        el.childListForManager.appendChild(textNode("div", "empty", "還沒有孩子"));
        return;
      }
      appData.children.forEach(child => {
        const done = child.tasks.filter(task => task.done).length;
        const fines = finesForChild(child.id).length;
        const button = document.createElement("button");
        button.type = "button";
        button.className = child.id === selectedChildId ? "child-button active" : "child-button";
        button.appendChild(textNode("div", "task-title", child.name));
        button.appendChild(textNode("div", "muted", `${child.points} 分 · 任務 ${child.tasks.length} · 完成 ${done} · 罰單 ${fines}`));
        button.addEventListener("click", () => { selectedChildId = child.id; renderAll(); });
        el.childListForManager.appendChild(button);
      });
    }

    function renderManagerWorkArea() {
      const child = getSelectedChild();
      if (!child) {
        el.selectedChildTitle.textContent = "選擇孩子";
        el.managerWorkArea.classList.add("hidden");
        el.deleteChildBtn.classList.add("hidden");
        return;
      }
      const fines = finesForChild(child.id);
      el.selectedChildTitle.textContent = child.name;
      el.managerWorkArea.classList.remove("hidden");
      el.deleteChildBtn.classList.remove("hidden");
      el.childPointCount.textContent = child.points;
      el.totalCount.textContent = child.tasks.length;
      el.fineCount.textContent = fines.length;
      empty(el.managerTaskList);
      if (!child.tasks.length) el.managerTaskList.appendChild(textNode("div", "empty", "目前沒有任務"));
      else child.tasks.forEach(task => el.managerTaskList.appendChild(taskCard(child, task, "manager")));
      renderFineList(el.managerFineList, fines);
    }

    function renderFineList(container, fines) {
      empty(container);
      if (!fines.length) {
        container.appendChild(textNode("div", "empty", "目前沒有罰單"));
        return;
      }
      fines.forEach(fine => {
        const card = document.createElement("div");
        card.className = "item";
        card.appendChild(textNode("div", "item-title", `扣 ${fine.points} 分`));
        card.appendChild(textNode("p", "", fine.reason));
        card.appendChild(textNode("p", "muted", `${fine.createdAt} · 實扣 ${fine.deducted} 分`));
        container.appendChild(card);
      });
    }

    function renderManagerShop() {
      empty(el.managerShopList);
      if (!appData.shop.length) {
        el.managerShopList.appendChild(textNode("div", "empty", "尚未上架商品"));
        return;
      }
      appData.shop.forEach(item => {
        const card = document.createElement("div");
        card.className = "item";
        card.appendChild(textNode("div", "item-title", item.name));
        card.appendChild(textNode("p", "", item.description || "沒有說明"));
        const row = document.createElement("div");
        row.className = "between";
        row.appendChild(textNode("span", "points", `${item.cost} 分`));
        row.appendChild(textNode("span", "muted", `剩 ${item.stock}`));
        card.appendChild(row);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn-red";
        btn.textContent = "下架";
        btn.addEventListener("click", () => runAction(() => api(`/api/shop/${item.id}`, { method: "DELETE" }), "商品已下架"));
        card.appendChild(btn);
        el.managerShopList.appendChild(card);
      });
    }

    function renderRedemptions() {
      empty(el.redemptionList);
      if (!appData.redemptions.length) {
        el.redemptionList.appendChild(textNode("div", "empty", "還沒有兌換紀錄"));
        return;
      }
      appData.redemptions.forEach(record => {
        const item = document.createElement("div");
        item.className = "item";
        item.appendChild(textNode("div", "item-title", `${record.childName} 兌換 ${record.itemName}`));
        item.appendChild(textNode("p", "", `${record.cost} 分 · ${record.createdAt}`));
        el.redemptionList.appendChild(item);
      });
    }

    function renderChildOptions() {
      empty(el.childLoginSelect);
      if (!appData.children.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "尚未建立孩子";
        el.childLoginSelect.appendChild(option);
        return;
      }
      appData.children.forEach(child => {
        const option = document.createElement("option");
        option.value = child.id;
        option.textContent = child.name;
        el.childLoginSelect.appendChild(option);
      });
      if (currentChildId) el.childLoginSelect.value = currentChildId;
    }

    function renderChildView() {
      const child = getCurrentChild();
      el.childPointBox.classList.toggle("hidden", !child);
      empty(el.childTaskList);
      empty(el.childFineList);
      empty(el.childShopList);
      if (!child) {
        el.childTitle.textContent = "我的任務";
        el.childTaskList.className = "empty";
        el.childTaskList.textContent = "請先選擇孩子";
        el.childFineList.appendChild(textNode("div", "empty", "請先選擇孩子"));
        el.childShopList.appendChild(textNode("div", "empty", "請先選擇孩子"));
        return;
      }
      el.childPointText.textContent = child.points;
      el.childTitle.textContent = `${child.name} 的任務`;
      el.childTaskList.className = "";
      if (!child.tasks.length) {
        el.childTaskList.className = "empty";
        el.childTaskList.textContent = "目前沒有任務";
      } else child.tasks.forEach(task => el.childTaskList.appendChild(taskCard(child, task, "child")));
      renderFineList(el.childFineList, finesForChild(child.id));
      const activeShop = appData.shop.filter(item => item.active);
      if (!activeShop.length) el.childShopList.appendChild(textNode("div", "empty", "商店還沒有商品"));
      else activeShop.forEach(item => el.childShopList.appendChild(shopCardForChild(child, item)));
    }

    function taskCard(child, task, mode) {
      const card = document.createElement("article");
      card.className = task.done ? "task done" : "task";
      card.appendChild(textNode("div", "task-title", task.name));
      card.appendChild(textNode("p", "", task.note));
      const meta = document.createElement("div");
      meta.className = "row";
      meta.appendChild(textNode("span", "points", `${task.points} 分`));
      meta.appendChild(textNode("span", task.done ? "status done" : "status", task.done ? "已完成" : "待完成"));
      meta.appendChild(textNode("span", "muted", task.needPhoto === "yes" ? "需要照片" : "不需照片"));
      card.appendChild(meta);
      if (task.completedAt) card.appendChild(textNode("p", "", `完成：${task.completedAt}`));
      if (task.photo) {
        const img = document.createElement("img");
        img.className = "photo";
        img.src = task.photo;
        img.alt = `${task.name} 的照片`;
        card.appendChild(img);
      }
      if (mode === "manager") {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn-red";
        btn.textContent = "刪除任務";
        btn.addEventListener("click", () => {
          if (confirm("確定刪除這個任務？")) runAction(() => api(`/api/children/${child.id}/tasks/${task.id}`, { method: "DELETE" }), "任務已刪除");
        });
        card.appendChild(btn);
      }
      if (mode === "child" && !task.done) {
        if (task.needPhoto === "yes") {
          const label = document.createElement("label");
          label.textContent = "上傳照片";
          card.appendChild(label);
          const input = document.createElement("input");
          input.type = "file";
          input.accept = "image/*";
          input.addEventListener("change", event => uploadPhoto(child.id, task.id, event));
          card.appendChild(input);
        }
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn-green";
        btn.textContent = `完成並得到 ${task.points} 分`;
        btn.addEventListener("click", () => finishTask(child.id, task.id));
        card.appendChild(btn);
      }
      return card;
    }

    function shopCardForChild(child, item) {
      const card = document.createElement("div");
      card.className = "item";
      card.appendChild(textNode("div", "item-title", item.name));
      card.appendChild(textNode("p", "", item.description || "沒有說明"));
      const row = document.createElement("div");
      row.className = "between";
      row.appendChild(textNode("span", "points", `${item.cost} 分`));
      row.appendChild(textNode("span", "muted", `剩 ${item.stock}`));
      card.appendChild(row);
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = child.points >= item.cost ? "兌換" : "積分不夠";
      btn.disabled = child.points < item.cost || item.stock < 1;
      btn.addEventListener("click", () => runAction(() => api(`/api/children/${child.id}/redeem/${item.id}`, { method: "POST" }), "兌換成功，請找家長領取"));
      card.appendChild(btn);
      return card;
    }

    async function runAction(action, successMessage) {
      try {
        await action();
        await loadData({ quiet: true });
        if (successMessage) showToast(successMessage);
      } catch (error) {
        showToast(error.message);
      }
    }

    async function uploadPhoto(childId, taskId, event) {
      const file = event.target.files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append("photo", file);
      await runAction(async () => {
        const response = await fetch(`/api/children/${childId}/tasks/${taskId}/photo`, { method: "POST", body: formData });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.message || "照片上傳失敗");
      }, "照片已上傳");
    }

    async function finishTask(childId, taskId) {
      try {
        const result = await api(`/api/children/${childId}/tasks/${taskId}/finish`, { method: "PUT" });
        await loadData({ quiet: true });
        showToast(`完成任務，得到 ${result.earnedPoints} 分`);
      } catch (error) { showToast(error.message); }
    }

    el.managerLoginBtn.addEventListener("click", async () => {
      const password = el.managerPasswordInput.value.trim();
      if (!password) return showToast("請輸入家長密碼");
      try {
        if (!appData.hasManagerPassword) {
          const managerName = el.managerNameInput.value.trim();
          const recoveryAnswer = el.recoveryAnswerInput.value.trim();
          if (!managerName) throw new Error("請輸入家長名稱");
          if (!recoveryAnswer) throw new Error("請輸入忘記密碼驗證答案");
          await api("/api/manager", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ managerName, newPassword: password, managerPassword: password, recoveryAnswer })
          });
        } else {
          await api("/api/manager/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password })
          });
        }
        managerPassword = password;
        sessionStorage.setItem("managerPassword", password);
        managerUnlocked = true;
        el.managerPasswordInput.value = "";
        await loadData({ quiet: true });
        showToast("已進入家長介面");
      } catch (error) { showToast(error.message); }
    });

    el.showResetBtn.addEventListener("click", () => el.resetPasswordPanel.classList.remove("hidden"));
    el.hideResetBtn.addEventListener("click", () => el.resetPasswordPanel.classList.add("hidden"));
    el.resetPasswordBtn.addEventListener("click", async () => {
      try {
        await api("/api/manager/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            managerName: el.resetNameInput.value.trim(),
            recoveryAnswer: el.resetAnswerInput.value.trim(),
            newPassword: el.resetPasswordInput.value.trim()
          })
        });
        el.resetPasswordPanel.classList.add("hidden");
        el.resetPasswordInput.value = "";
        showToast("密碼已更新，請用新密碼登入");
      } catch (error) { showToast(error.message); }
    });

    el.managerLogoutBtn.addEventListener("click", () => {
      managerPassword = "";
      managerUnlocked = false;
      sessionStorage.removeItem("managerPassword");
      renderAll();
    });

    el.managerModeBtn.addEventListener("click", () => switchMode("manager"));
    el.childModeBtn.addEventListener("click", () => switchMode("child"));
    el.refreshBtn.addEventListener("click", () => loadData());

    el.addChildBtn.addEventListener("click", async () => {
      const name = el.childNameInput.value.trim();
      if (!name) return showToast("請輸入孩子名稱");
      try {
        const child = await api("/api/children", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name })
        });
        selectedChildId = child.id;
        currentChildId = child.id;
        el.childNameInput.value = "";
        await loadData({ quiet: true });
        showToast("孩子已新增");
      } catch (error) { showToast(error.message); }
    });

    el.deleteChildBtn.addEventListener("click", () => {
      const child = getSelectedChild();
      if (child && confirm(`確定刪除 ${child.name}？`)) runAction(() => api(`/api/children/${child.id}`, { method: "DELETE" }), "孩子已刪除");
    });

    el.sendTaskBtn.addEventListener("click", async () => {
      const child = getSelectedChild();
      if (!child) return showToast("請先選擇孩子");
      const name = el.taskNameInput.value.trim();
      if (!name) return showToast("請輸入任務名稱");
      await runAction(() => api(`/api/children/${child.id}/tasks`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, note: el.taskNoteInput.value.trim(), points: el.taskPointsInput.value, needPhoto: el.needPhotoSelect.value })
      }), "任務已送出");
      el.taskNameInput.value = "";
      el.taskNoteInput.value = "";
      el.taskPointsInput.value = "5";
      el.needPhotoSelect.value = "no";
    });

    el.addFineBtn.addEventListener("click", async () => {
      const child = getSelectedChild();
      if (!child) return showToast("請先選擇孩子");
      const reason = el.fineReasonInput.value.trim();
      if (!reason) return showToast("請輸入罰單原因");
      await runAction(() => api(`/api/children/${child.id}/fines`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ points: el.finePointsInput.value, reason })
      }), "罰單已建立，積分已扣除");
      el.fineReasonInput.value = "";
      el.finePointsInput.value = "3";
    });

    el.addShopItemBtn.addEventListener("click", async () => {
      const name = el.shopNameInput.value.trim();
      if (!name) return showToast("請輸入商品名稱");
      await runAction(() => api("/api/shop", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, description: el.shopDescriptionInput.value.trim(), cost: el.shopCostInput.value, stock: el.shopStockInput.value })
      }), "商品已上架");
      el.shopNameInput.value = "";
      el.shopDescriptionInput.value = "";
      el.shopCostInput.value = "20";
      el.shopStockInput.value = "1";
    });

    el.childLoginBtn.addEventListener("click", () => {
      const childId = el.childLoginSelect.value;
      if (!childId) return showToast("目前沒有孩子");
      currentChildId = childId;
      renderAll();
      showToast("已進入孩子介面");
    });

    loadData();
    setInterval(() => loadData({ quiet: true }), 5000);
  </script>
</body>
</html>
