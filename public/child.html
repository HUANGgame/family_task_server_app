<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>兒童登入 | Family Task Server App</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/">
          <span class="brand-mark">FT</span>
          <span>兒童登入</span>
        </a>
      </header>

      <section class="auth-box panel" id="childAuthPanel">
        <div class="panel-head"><h2>孩子登入</h2></div>
        <form id="childLoginForm" class="form-grid">
          <label class="form-row">Family Code<input name="familyCode" required autocomplete="off"></label>
          <label class="form-row">Child Code<input name="childCode" required autocomplete="off"></label>
          <div class="form-row"><label>&nbsp;</label><button class="btn good" type="submit">登入</button></div>
        </form>
        <p class="status" id="childLoginStatus"></p>
      </section>

      <main class="app-grid hidden" id="childAppPanel">
        <aside class="sidebar">
          <h2 id="childName">兒童</h2>
          <p class="muted small">點數</p>
          <div class="stat"><strong id="childPoints">0</strong></div>
          <div class="tabs">
            <button class="btn tab-btn active" data-tab="tasks">任務</button>
            <button class="btn tab-btn" data-tab="shop">商店</button>
            <button class="btn tab-btn" data-tab="fines">扣點紀錄</button>
          </div>
          <div class="danger-zone">
            <button class="btn danger" id="childClearSessionBtn">清除本機登入</button>
          </div>
        </aside>

        <section class="main-stack">
          <div class="panel">
            <div class="panel-head">
              <h2>今日鼓勵</h2>
              <button class="btn secondary" id="encourageBtn">重新整理</button>
            </div>
            <p id="encouragementText" class="muted">-</p>
          </div>

          <div class="view active" data-view="tasks">
            <div class="panel">
              <div class="panel-head">
                <h2>任務</h2>
                <button class="btn secondary" id="refreshChildBtn">重新整理</button>
              </div>
              <div class="list" id="childTasksList"></div>
            </div>
          </div>

          <div class="view" data-view="shop">
            <div class="panel">
              <div class="panel-head"><h2>商店</h2></div>
              <div class="list" id="childShopList"></div>
            </div>
          </div>

          <div class="view" data-view="fines">
            <div class="panel">
              <div class="panel-head"><h2>扣點紀錄</h2></div>
              <div class="list" id="childFinesList"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
    <script src="/child.js"></script>
  </body>
</html>
