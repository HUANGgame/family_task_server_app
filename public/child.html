<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>兒童登入 | Family Task Server App</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell child-mode">
      <header class="topbar">
        <a class="brand" href="/">
          <span class="brand-mark">FT</span>
          <span class="login-zhuyin">
            <ruby>兒<rt>ㄦˊ</rt></ruby><ruby>童<rt>ㄊㄨㄥˊ</rt></ruby><ruby>版<rt>ㄅㄢˇ</rt></ruby>
          </span>
        </a>
      </header>

      <section class="auth-box panel child-login-panel" id="childAuthPanel">
        <div class="panel-head">
          <h2 class="login-zhuyin">
            <ruby>兒<rt>ㄦˊ</rt></ruby><ruby>童<rt>ㄊㄨㄥˊ</rt></ruby><ruby>登<rt>ㄉㄥ</rt></ruby><ruby>入<rt>ㄖㄨˋ</rt></ruby>
          </h2>
        </div>
        <form id="childLoginForm" class="form-grid">
          <label class="form-row">
            <span class="login-zhuyin">
              <ruby>家<rt>ㄐㄧㄚ</rt></ruby><ruby>庭<rt>ㄊㄧㄥˊ</rt></ruby><ruby>代<rt>ㄉㄞˋ</rt></ruby><ruby>碼<rt>ㄇㄚˇ</rt></ruby>
            </span>
            <input name="familyCode" required autocomplete="off">
          </label>
          <label class="form-row">
            <span class="login-zhuyin">
              <ruby>小<rt>ㄒㄧㄠˇ</rt></ruby><ruby>孩<rt>ㄏㄞˊ</rt></ruby><ruby>代<rt>ㄉㄞˋ</rt></ruby><ruby>碼<rt>ㄇㄚˇ</rt></ruby>
            </span>
            <input name="childCode" required autocomplete="off" maxlength="4" minlength="4" inputmode="text">
          </label>
          <div class="form-row"><label>&nbsp;</label><button class="btn good" type="submit"><span class="login-zhuyin"><ruby>登<rt>ㄉㄥ</rt></ruby><ruby>入<rt>ㄖㄨˋ</rt></ruby></span></button></div>
        </form>
        <p class="status" id="childLoginStatus"></p>
      </section>

      <main class="app-grid hidden" id="childAppPanel">
        <aside class="sidebar">
          <h2 id="childName" class="child-name">兒童</h2>
          <p class="muted small zhuyin-text" data-zhuyin="點數"></p>
          <div class="stat child-points"><strong id="childPoints">0</strong></div>

          <div class="tabs">
            <button class="btn tab-btn active" data-tab="tasks">任務</button>
            <button class="btn tab-btn" data-tab="shop">商店</button>
            <button class="btn tab-btn" data-tab="fines">扣點紀錄</button>
          </div>
          <div class="danger-zone">
            <button class="btn danger" id="childClearSessionBtn">登出</button>
          </div>
        </aside>

        <section class="main-stack">
          <div class="panel">
            <div class="panel-head">
              <h2 class="zhuyin-text" data-zhuyin="今日鼓勵"></h2>
              <button class="btn secondary" id="encourageBtn">重新整理</button>
            </div>
            <p id="encouragementText" class="muted child-readable">-</p>
          </div>

          <div class="view active" data-view="tasks">
            <div class="panel">
              <div class="panel-head">
                <h2 class="zhuyin-text" data-zhuyin="任務"></h2>
                <button class="btn secondary" id="refreshChildBtn">重新整理</button>
              </div>
              <div class="list" id="childTasksList"></div>
            </div>
          </div>

          <div class="view" data-view="shop">
            <div class="panel">
              <div class="panel-head"><h2 class="zhuyin-text" data-zhuyin="商店"></h2></div>
              <div class="list" id="childShopList"></div>
            </div>
          </div>

          <div class="view" data-view="fines">
            <div class="panel">
              <div class="panel-head"><h2 class="zhuyin-text" data-zhuyin="扣點紀錄"></h2></div>
              <div class="list" id="childFinesList"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
    <script src="/child.js"></script>
  </body>
</html>
