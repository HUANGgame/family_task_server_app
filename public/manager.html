<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>家長管理 | Family Task Server App</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/">
          <span class="brand-mark">FT</span>
          <span>家長管理</span>
        </a>
      </header>

      <section class="auth-box panel" id="authPanel">
        <div class="auth-tabs">
          <button class="btn good" data-auth="login">家長登入</button>
          <button class="btn secondary" data-auth="create">建立家庭</button>
        </div>

        <form id="createFamilyForm" class="auth-form">
          <div class="panel-head">
            <div>
              <h2>建立家庭與第一個小孩帳號</h2>
              <p class="muted small">媽媽先把小孩帳號建好，系統會給小孩 4 位 Child Code。</p>
            </div>
          </div>
          <div class="form-grid">
            <label class="form-row">家庭名稱<input name="familyName" required autocomplete="organization"></label>
            <label class="form-row">家長名稱<input name="managerName" required autocomplete="name"></label>
            <label class="form-row">家長密碼<input name="managerPassword" type="password" required autocomplete="new-password" minlength="6"></label>
            <label class="form-row">小孩名稱<input name="childName" required autocomplete="off"></label>
          </div>
          <div class="button-row">
            <button class="btn good" type="submit">建立帳號</button>
            <span class="status" id="createStatus"></span>
          </div>
        </form>

        <form id="loginForm" class="auth-form hidden">
          <div class="form-grid">
            <label class="form-row">家庭代碼<input name="familyCode" required autocomplete="off"></label>
            <label class="form-row">家長密碼<input name="password" type="password" required autocomplete="current-password"></label>
          </div>
          <div class="button-row">
            <button class="btn good" type="submit">登入</button>
            <button class="btn secondary" type="button" id="forgotPasswordBtn">忘記密碼</button>
            <span class="status" id="loginStatus"></span>
          </div>
        </form>

        <form id="resetForm" class="auth-form hidden">
          <div class="panel-head">
            <div>
              <h2>重設家長密碼</h2>
              <p class="muted small">輸入家庭代碼與家長名稱後，設定新的家長密碼。</p>
            </div>
          </div>
          <div class="form-grid">
            <label class="form-row">家庭代碼<input name="familyCode" required autocomplete="off"></label>
            <label class="form-row">家長名稱<input name="managerName" required autocomplete="name"></label>
            <label class="form-row">新密碼<input name="newPassword" type="password" required minlength="6" autocomplete="new-password"></label>
          </div>
          <div class="button-row">
            <button class="btn warn" type="submit">重設密碼</button>
            <span class="status" id="resetStatus"></span>
          </div>
        </form>
      </section>

      <main class="app-grid hidden" id="appPanel">
        <aside class="sidebar">
          <h2>家庭</h2>
          <p class="muted small">Family Code: <span class="code" id="familyCodeText">-</span></p>
          <div class="tabs">
            <button class="btn tab-btn active" data-tab="dashboard">總覽</button>
            <button class="btn tab-btn" data-tab="children">小孩帳號</button>
            <button class="btn tab-btn" data-tab="tasks">任務</button>
            <button class="btn tab-btn" data-tab="fines">扣點</button>
            <button class="btn tab-btn" data-tab="shop">商店</button>
            <button class="btn tab-btn" data-tab="messages">鼓勵語</button>
            <button class="btn tab-btn" data-tab="ai">AI Demo</button>
          </div>
          <div class="danger-zone">
            <button class="btn danger" id="clearSessionBtn">登出</button>
          </div>
        </aside>

        <section class="main-stack">
          <div class="view active" data-view="dashboard">
            <div class="panel">
              <div class="panel-head">
                <h2>總覽</h2>
                <button class="btn secondary" id="refreshDashboardBtn">重新整理</button>
              </div>
              <div class="stats" id="stats"></div>
            </div>
          </div>

          <div class="view" data-view="children">
            <div class="panel">
              <div class="panel-head">
                <div>
                  <h2>小孩帳號</h2>
                  <p class="muted small">媽媽在這裡替小孩建立帳號。建立後把 4 位 Child Code 給小孩，小孩輸入就能進入。</p>
                </div>
              </div>
              <form id="childForm" class="form-grid">
                <label class="form-row">小孩名稱<input name="childName" required autocomplete="off"></label>
                <div class="form-row"><label>&nbsp;</label><button class="btn good" type="submit">建立小孩帳號</button></div>
              </form>
              <p class="status" id="childStatus"></p>
              <div class="list" id="childrenList"></div>
            </div>
          </div>

          <div class="view" data-view="tasks">
            <div class="panel">
              <div class="panel-head"><h2>任務</h2></div>
              <form id="taskForm" class="form-grid">
                <label class="form-row">小孩<select name="childId" required class="childSelect"></select></label>
                <label class="form-row">任務名稱<input name="taskName" required></label>
                <label class="form-row">分類<select name="category"><option>家事</option><option>學習</option><option>生活</option><option>運動</option><option>其他</option></select></label>
                <label class="form-row">點數<input name="points" type="number" min="1" value="1" required></label>
                <label class="form-row">說明<input name="taskNote"></label>
                <label class="form-row">照片要求<select name="needPhoto"><option value="false">不需要</option><option value="true">需要</option></select></label>
                <div class="form-row"><label>&nbsp;</label><button class="btn good" type="submit">新增任務</button></div>
              </form>
              <p class="status" id="taskStatus"></p>
              <div class="list" id="tasksList"></div>
            </div>
          </div>

          <div class="view" data-view="fines">
            <div class="panel">
              <div class="panel-head"><h2>扣點</h2></div>
              <form id="fineForm" class="form-grid">
                <label class="form-row">小孩<select name="childId" required class="childSelect"></select></label>
                <label class="form-row">扣點上限<input name="points" type="number" min="1" value="1" required></label>
                <label class="form-row">原因<input name="reason" required></label>
                <div class="form-row"><label>&nbsp;</label><button class="btn warn" type="submit">建立扣點</button></div>
              </form>
              <p class="status" id="fineStatus"></p>
              <div class="list" id="finesList"></div>
            </div>
          </div>

          <div class="view" data-view="shop">
            <div class="panel">
              <div class="panel-head"><h2>商店</h2></div>
              <form id="shopForm" class="form-grid">
                <label class="form-row">名稱<input name="name" required></label>
                <label class="form-row">說明<input name="description"></label>
                <label class="form-row">點數成本<input name="cost" type="number" min="1" value="5" required></label>
                <label class="form-row">庫存<input name="stock" type="number" min="0" value="1"></label>
                <div class="form-row"><label>&nbsp;</label><button class="btn good" type="submit">新增商品</button></div>
              </form>
              <p class="status" id="shopStatus"></p>
              <div class="list" id="shopList"></div>
            </div>
          </div>

          <div class="view" data-view="messages">
            <div class="panel">
              <div class="panel-head"><h2>鼓勵語</h2></div>
              <form id="messageForm" class="form-grid">
                <label class="form-row">訊息<input name="message" required></label>
                <div class="form-row"><label>&nbsp;</label><button class="btn good" type="submit">新增鼓勵語</button></div>
              </form>
              <p class="status" id="messageStatus"></p>
              <div class="list" id="messagesList"></div>
            </div>
          </div>

          <div class="view" data-view="ai">
            <div class="panel">
              <div class="panel-head"><h2>AI 任務建議 Demo</h2></div>
              <form id="aiForm" class="form-grid">
                <label class="form-row">主題<input name="prompt" placeholder="例如：整理房間、準備考試"></label>
                <div class="form-row"><label>&nbsp;</label><button class="btn warn" type="submit">產生建議</button></div>
              </form>
              <p class="status" id="aiStatus"></p>
              <div class="list" id="aiList"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
    <script src="/manager.js"></script>
  </body>
</html>
